version: "3.9"

services:
  db:
    image: postgres:15
    container_name: saas_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: as45sd56
      POSTGRES_DB: saas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: saas_backend
    restart: always
    ports:
      - "3333:3333"
    depends_on:
      - db
    env_file:
      - ./backend/.env.docker

  frontend:
    build: ./frontend
    container_name: saas_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3333

volumes:
  postgres_data: