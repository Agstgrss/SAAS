version: "3.9"

services:
  db:
    image: postgres:15
    container_name: saas_db
    restart: always
    env_file:
    - ./backend/.env.docker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: saas_backend
    restart: always
    ports:
      - "3333:3333"
    depends_on:
      - db
    env_file:
      - ./backend/.env.docker
    environment:
      NODE_ENV: production

  frontend:
    build: ./frontend
    container_name: saas_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3333

volumes:
  postgres_data: